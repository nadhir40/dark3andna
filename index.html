<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Darak 3andna</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#fff;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
border-bottom:1px solid #eee;
position:fixed;
top:0;
width:100%;
background:white;
z-index:1000;
}

.menu-btn{
font-size:28px;
cursor:pointer;
}

.logo{
font-size:24px;
font-weight:bold;
}

.signin{
color:#006AFF;
font-weight:bold;
text-decoration:none;
}

.sidebar{
height:100%;
width:0;
position:fixed;
top:0;
left:0;
background:white;
overflow-x:hidden;
transition:0.3s;
z-index:2000;
box-shadow:2px 0 10px rgba(0,0,0,0.1);
}

.sidebar-content{
padding:20px;
}

.closebtn{
font-size:30px;
cursor:pointer;
}

.sidebar h2{
margin-top:20px;
}

.hero{
margin-top:100px;
padding:20px;
text-align:center;
}

.hero h1{
font-size:40px;
margin-bottom:25px;
}

.search-box{
max-width:700px;
margin:auto;
display:flex;
border:1px solid #ddd;
border-radius:50px;
overflow:hidden;
}

.search-box input{
flex:1;
padding:18px;
border:none;
outline:none;
font-size:18px;
}

.search-box button{
background:#006AFF;
color:white;
border:none;
padding:18px 25px;
cursor:pointer;
}

.bottom-nav{
position:fixed;
bottom:0;
width:100%;
background:white;
border-top:1px solid #ddd;
display:flex;
justify-content:space-around;
padding:12px 0;
}

.bottom-nav a{
text-decoration:none;
color:#333;
font-size:14px;
text-align:center;
}
</style>
</head>

<body>

<div class="header">
<div class="menu-btn" onclick="openMenu()">☰</div>
<div class="logo">Darak 3andna</div>
<a href="#" class="signin">Sign In</a>
</div>

<div id="sidebar" class="sidebar">
<div class="sidebar-content">
<div class="closebtn" onclick="closeMenu()">✕</div>

<h2>Darak 3andna</h2>

<br>

<p>🏠 Home</p>
<br>
<p>🔑 Rentals</p>
<br>
<p>🏢 Buy</p>
<br>
<p>📞 Contact</p>
<br>
<p>⚙ Settings</p>

</div>
</div>

<div class="hero">

<h1>
Rentals. Homes. Agents. Loans.
</h1>

<div class="search-box">
<input type="text" placeholder="Enter city, address or property">
<button>Search</button>
</div>

</div>

<div class="bottom-nav">
<a href="#">Inbox</a>
<a href="#">Plan</a>
<a href="#">Favorites</a>
<a href="#">Updates</a>
<a href="#">Search</a>
</div>

<script>
function openMenu(){
document.getElementById("sidebar").style.width="280px";
}

function closeMenu(){
document.getElementById("sidebar").style.width="0";
}
</script>

</body>
</html>
